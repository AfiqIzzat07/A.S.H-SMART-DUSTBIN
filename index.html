<!DOCTYPE html>
<html>
<head>
  <title>Smart Dustbin</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }
    .card { background: white; padding: 20px; margin: 40px auto; width: 300px; border-radius: 12px; }
    button { padding: 12px 20px; font-size: 16px; }
  </style>
</head>

<body>
  <div class="card">
    <h2>🗑️ Smart Dustbin</h2>
    <h3 id="percent">--%</h3>
    <p id="status">Loading...</p>
    <button onclick="forceOpen()">Force Open (Cleaner)</button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue, set }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBD990zggrFpi5Z2DwAOLShTjJUDN8ydBo",
  authDomain: "smart-dustbin-150307.firebaseapp.com",
  databaseURL: "https://smart-dustbin-150307-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "smart-dustbin-150307",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const percentEl = document.getElementById("percent");
const statusEl = document.getElementById("status");

onValue(ref(db, "/bin"), snap => {
  const d = snap.val();
  percentEl.innerText = d.percentage + "%";
  statusEl.innerText = d.full ? "🚨 BIN FULL" : "✅ NOT FULL";
});

window.forceOpen = () => {
  set(ref(db, "/bin/forceOpen"), true);
};
</script>
</body>
</html>
